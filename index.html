<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NeoQR Custom Studio</title>
    <!-- Используем стабильную библиотеку QRious, которая отлично работает локально без серверов -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <!-- Google Fonts для красивых шрифтов -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070b19 0%, #0f172a 50%, #1e112a 100%);
            --panel-bg: rgba(15, 23, 42, 0.65);
            --neon-cyan: #00f2fe;
            --neon-magenta: #fe019a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 242, 254, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Динамические живые неоновые сферы на фоне */
        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(254, 1, 154, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -10%;
            left: -10%;
            z-index: 0;
            animation: floatGlow 10s ease-in-out infinite alternate;
        }
        .ambient-glow-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: 0;
            animation: floatGlow 12s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* Скрытый блок для YouTube плеера */
        #youtube-audio-container {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            top: -100px;
            left: -100px;
            opacity: 0;
            pointer-events: none;
        }

        /* Виджет управления музыкой сверху */
        .music-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .music-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .music-btn {
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: 0.2s;
        }
        .music-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 10px var(--neon-cyan); }

        /* Главный контейнер */
        .app-container {
            position: relative;
            z-index: 10;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 540px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .app-container:hover {
            border-color: var(--border-glow);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7),
                        0 0 40px rgba(0, 242, 254, 0.15);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 36px;
        }

        .input-block {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--neon-cyan);
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        /* Настройки цвета */
        .customizer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-card span {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            background: none;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* Кнопки */
        .action-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--neon-cyan) 0%, #0284c7 100%);
            border: none;
            border-radius: 16px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
            background: linear-gradient(90deg, var(--neon-cyan) 0%, var(--neon-magenta) 100%);
            color: #fff;
        }

        /* Секция вывода результата */
        .result-viewport {
            margin-top: 0;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .result-viewport.show {
            margin-top: 40px;
            max-height: 500px;
            opacity: 1;
        }

        .qr-frame {
            background: #fff;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            transition: transform 0.3s ease;
        }
        .qr-frame:hover {
            transform: scale(1.02) rotate(1deg);
        }

        #qr-canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .download-btn {
            background: transparent;
            border: 2px solid var(--neon-magenta);
            color: var(--neon-magenta);
            box-shadow: none;
        }

        .download-btn:hover {
            background: var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 25px rgba(254, 1, 154, 0.5);
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <!-- Виджет фоновой музыки -->
    <div class="music-widget">
        <span class="music-title">Synthwave Radio</span>
        <button class="music-btn" id="play-pause-btn" title="Включить/Выключить звук">
            <svg id="audio-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>

    <!-- Скрытый контейнер для YouTube плеера -->
    <div id="youtube-audio-container">
        <div id="player"></div>
    </div>

    <div class="app-container">
        <h1>NeoQR Studio</h1>
        <p class="subtitle">Стильный дизайн, локальная генерация, ламповый саунд</p>

        <div class="input-block">
            <label for="url-input">Ваша ссылка / Секретный текст</label>
            <input type="text" id="url-input" placeholder="https://cyber-world.io" autocomplete="off">
        </div>

        <!-- Настройки кастомизации -->
        <div class="customizer-grid">
            <div class="option-card">
                <span>Цвет кода</span>
                <input type="color" id="dot-color" value="#070b19">
            </div>
            <div class="option-card">
                <span>Цвет фона</span>
                <input type="color" id="bg-color" value="#ffffff">
            </div>
        </div>

        <button class="action-btn" id="generate-btn">СГЕНЕРИРОВАТЬ</button>

        <!-- Вывод готового QR кода -->
        <div class="result-viewport" id="result-viewport">
            <div class="qr-frame">
                <!-- Отрисовываем напрямую в Canvas (работает везде на 100%) -->
                <canvas id="qr-canvas"></canvas>
            </div>
            <button class="action-btn download-btn" id="download-btn">СКАЧАТЬ PNG</button>
        </div>
    </div>

    <footer>OFFLINE ENGINE // NO API USED</footer>

    <script>
        const urlInput = document.getElementById('url-input');
        const generateBtn = document.getElementById('generate-btn');
        const resultViewport = document.getElementById('result-viewport');
        const qrCanvas = document.getElementById('qr-canvas');
        const downloadBtn = document.getElementById('download-btn');
        
        const dotColorInput = document.getElementById('dot-color');
        const bgColorInput = document.getElementById('bg-color');

        let qrInstance = null;

        // Создаем QR код через стабильный QRious
        generateBtn.addEventListener('click', () => {
            const textValue = urlInput.value.trim();
            if (!textValue) {
                alert('Сначала введите рабочую ссылку или текст!');
                return;
            }

            // Инициализация и рендер
            qrInstance = new QRious({
                element: qrCanvas,
                value: textValue,
                size: 250,
                foreground: dotColorInput.value,
                background: bgColorInput.value,
                level: 'H' // Максимальное качество выравнивания ошибок
            });

            resultViewport.classList.add('show');

            // Запуск музыки при первом клике генерации
            if (ytPlayer && typeof ytPlayer.playVideo === 'function' && !isMusicPlaying) {
                toggleMusic();
            }
        });

        // Безопасное скачивание напрямую из Canvas
        downloadBtn.addEventListener('click', () => {
            if (!qrCanvas) return;
            
            const link = document.createElement('a');
            link.href = qrCanvas.toDataURL('image/png');
            link.download = 'neo-qr-code.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Скрывать блок при изменении текста
        urlInput.addEventListener('input', () => {
            resultViewport.classList.remove('show');
        });

        // ==========================================
        // ЛОГИКА РАБОТЫ С YOUTUBE AUDIO БЕЗ ВИДЕО
        // ==========================================
        let ytPlayer;
        let isMusicPlaying = false;
        const playPauseBtn = document.getElementById('play-pause-btn');
        const audioIcon = document.getElementById('audio-icon');

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100',
                width: '100',
                videoId: 'diLhfXKit0U',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'disablekb': 1,
                    'loop': 1,
                    'playlist': 'diLhfXKit0U',
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(40); // Комфортная громкость
        }

        function toggleMusic() {
            if (!ytPlayer) return;

            if (!isMusicPlaying) {
                ytPlayer.playVideo();
                isMusicPlaying = true;
                audioIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
                playPauseBtn.style.background = 'var(--neon-magenta)';
                playPauseBtn.style.boxShadow = '0 0 10px var(--neon-magenta)';
            } else {
                ytPlayer.pauseVideo();
                isMusicPlaying = false;
                audioIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
                playPauseBtn.style.background = 'rgba(255, 255, 255, 0.1)';
                playPauseBtn.style.boxShadow = 'none';
            }
        }

        playPauseBtn.addEventListener('click', toggleMusic);
    </script>
</body>
</html>
