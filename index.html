<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoQR - Генератор QR-кодов</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --card-bg: #111827;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Декоративные фоновые элементы для киберпанк-атмосферы */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
        }
        body::before { top: 10%; left: 10%; }
        body::after { bottom: 10%; right: 10%; }

        .container {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        0 0 50px rgba(5b, 130, 246, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            background-color: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Настройки кастомизации цвета */
        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .color-picker-wrapper {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .color-picker-wrapper span {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #1d4ed8 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        button:active { transform: translateY(0); }

        /* Секция результата */
        .result-panel {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 0;
            overflow: hidden;
        }

        .result-panel.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
            height: auto;
            overflow: visible;
        }

        .qrcode-wrapper {
            background-color: #fff;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            display: inline-block;
        }

        /* Стилизация самого генерируемого изображения */
        .qrcode-wrapper img {
            display: block;
        }

        .download-btn {
            background: transparent;
            border: 2px solid var(--success);
            color: var(--success);
            box-shadow: none;
        }

        .download-btn:hover {
            background-color: var(--success);
            color: #fff;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }

        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>NeoQR</h1>
        <p class="subtitle">Мгновенное создание стильных QR-кодов локально</p>

        <div class="input-group">
            <label for="url-input">Ваша ссылка или текст</label>
            <input type="text" id="url-input" placeholder="https://example.com" autocomplete="off">
        </div>

        <div class="config-row">
            <div class="color-picker-wrapper">
                <span>Цвет QR</span>
                <input type="color" id="qr-color" value="#0a0f1d">
            </div>
            <div class="color-header" style="display:none;"></div> <div class="color-picker-wrapper">
                <span>Фон</span>
                <input type="color" id="bg-color-picker" value="#ffffff">
            </div>
        </div>

        <button id="generate-btn">Сгенерировать код</button>

        <div class="result-panel" id="result-panel">
            <div class="qrcode-wrapper">
                <div id="qrcode"></div>
            </div>
            <button class="download-btn" id="download-btn">Скачать PNG</button>
        </div>
    </div>

    <footer>Сгенерировано без использования внешних API</footer>

    <script>
        const urlInput = document.getElementById('url-input');
        const generateBtn = document.getElementById('generate-btn');
        const resultPanel = document.getElementById('result-panel');
        const qrContainer = document.getElementById('qrcode');
        const downloadBtn = document.getElementById('download-btn');
        
        const qrColorPicker = document.getElementById('qr-color');
        const bgColorPicker = document.getElementById('bg-color-picker');

        let qrCodeInstance = null;

        generateBtn.addEventListener('click', () => {
            let text = urlInput.value.trim();
            
            if (!text) {
                alert('Пожалуйста, введите текст или ссылку!');
                urlInput.focus();
                return;
            }

            // Очищаем старый QR-код если он был
            qrContainer.innerHTML = '';

            // Создаем новый объект QR-кода прямо в памяти браузера
            qrCodeInstance = new QRCode(qrContainer, {
                text: text,
                width: 200,
                height: 200,
                colorDark: qrColorPicker.value,
                colorLight: bgColorPicker.value,
                correctLevel: QRCode.CorrectLevel.H
            });

            // Небольшая задержка, чтобы библиотека успела отрендерить <img> из тега <canvas>
            setTimeout(() => {
                const qrImg = qrContainer.querySelector('img');
                if (qrImg && qrImg.src) {
                    resultPanel.classList.add('active');
                    // Скроллим к результату для удобства на мобильных
                    resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }, 100);
        });

        // Функция скачивания готового изображения
        downloadBtn.addEventListener('click', () => {
            const qrImg = qrContainer.querySelector('img');
            if (!qrImg) return;

            const link = document.createElement('a');
            link.href = qrImg.src;
            link.download = 'qr-code.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Скрывать панель при изменении текста, чтобы пользователь видел изменения только по кнопке
        urlInput.addEventListener('input', () => {
            if(resultPanel.classList.contains('active')) {
                resultPanel.classList.remove('active');
            }
        });
    </script>
</body>
</html>
