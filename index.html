<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NeoQR Studio — Premium Parallax</title>
    
    <!-- Подключаем скрипты для стабильного QR и мощной анимации как на видео -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <!-- Шрифты будущего -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-magenta: #fe019a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #030712;
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            height: 200vh; /* Создаем высоту для скролла, чтобы работал параллакс */
        }

        /* ==========================================
           МНОГОСЛОЙНЫЙ 3D ПАРАЛЛАКС (КАК В ВИДЕО)
           ========================================== */
        .parallax-viewport {
            position: fixed; /* Фиксируем на экране, пока крутится скролл */
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 120%; /* Чуть больше экрана, чтобы было пространство для сдвига */
            background-size: cover;
            background-position: center bottom;
            will-change: transform;
        }

        /* СЛОЙ 1: Ваша гифка b.gif на самом дальнем плане */
        .layer-bg {
            background-image: url('b.gif');
            z-index: 1;
            height: 100vh;
        }

        /* СЛОЙ 2: Неоновая дымка (программный градиент для глубины) */
        .layer-fog {
            background: radial-gradient(circle at 50% 50%, rgba(254, 1, 154, 0.15) 0%, transparent 60%);
            z-index: 2;
        }

        /* СЛОЙ 3: Силуэты футуристичного города/гор на переднем плане */
        .layer-foreground {
            background: linear-gradient(to top, #030712 20%, transparent 80%);
            z-index: 3;
            height: 110vh;
        }

        /* Виджет музыки сверху */
        .music-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .music-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            transition: 0.2s;
        }
        .music-btn:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 10px var(--neon-cyan); }

        #youtube-audio-container {
            position: absolute;
            width: 1px; height: 1px; overflow: hidden; top: -100px; left: -100px; opacity: 0;
        }

        /* ==========================================
           КОНТЕНТ И НЕОНОВЫЙ ИНТЕРФЕЙС
           ========================================== */
        .scroll-container {
            position: relative;
            z-index: 10; /* Поверх параллакса */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Начальный экран с красивым заголовком */
        .hero-section {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff 20%, var(--neon-cyan) 60%, var(--neon-magenta) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            text-shadow: 0 0 40px rgba(0, 242, 254, 0.3);
        }

        .scroll-hint {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            margin-top: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(5px); }
        }

        /* Блок самого генератора */
        .generator-section {
            width: 100%;
            max-width: 520px;
            padding: 0 20px 100px 20px;
        }

        .app-container {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .input-block { margin-bottom: 24px; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-cyan);
            margin-bottom: 12px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        .customizer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-card span { font-size: 0.85rem; color: var(--text-muted); }

        input[type="color"] {
            -webkit-appearance: none; border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; background: none;
        }
        input[type="color"]::-webkit-color-swatch { border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 8px; }

        .action-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--neon-cyan) 0%, #0284c7 100%);
            border: none;
            border-radius: 16px;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.6);
            background: linear-gradient(90deg, var(--neon-cyan) 0%, var(--neon-magenta) 100%);
            color: #fff;
        }

        /* Вывод QR */
        .result-viewport {
            margin-top: 0; max-height: 0; opacity: 0; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; align-items: center;
        }

        .result-viewport.show { margin-top: 36px; max-height: 500px; opacity: 1; }

        .qr-frame {
            background: #fff; padding: 20px; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 24px;
        }

        #qr-canvas { display: block; max-width: 100%; height: auto; }

        .download-btn { background: transparent; border: 2px solid var(--neon-magenta); color: var(--neon-magenta); box-shadow: none; }
        .download-btn:hover { background: var(--neon-magenta); color: #fff; box-shadow: 0 0 25px rgba(254, 1, 154, 0.5); }
    </style>
</head>
<body>

    <!-- Задний план: Слои Параллакса (движутся от скролла с разной скоростью) -->
    <div class="parallax-viewport">
        <div class="layer layer-bg" id="layer-1"></div>
        <div class="layer layer-fog" id="layer-2"></div>
        <div class="layer layer-foreground" id="layer-3"></div>
    </div>

    <!-- Виджет фоновой музыки из видео -->
    <div class="music-widget">
        <span class="music-title">Synthwave Radio</span>
        <button class="music-btn" id="play-pause-btn">
            <svg id="audio-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>
    <div id="youtube-audio-container"><div id="player"></div></div>

    <!-- Прокручиваемый контент -->
    <div class="scroll-container">
        
        <section class="hero-section">
            <h1>NEOQR STUDIO</h1>
            <p style="color: var(--text-muted);">Эксклюзивный параллакс-движок на вашем хостинге</p>
            <div class="scroll-hint">Листайте вниз ↓</div>
        </section>

        <section class="generator-section">
            <div class="app-container">
                <div class="input-block">
                    <label for="url-input">Ваша ссылка / Текст</label>
                    <input type="text" id="url-input" placeholder="https://example.com" autocomplete="off">
                </div>

                <div class="customizer-grid">
                    <div class="option-card">
                        <span>Цвет кода</span>
                        <input type="color" id="dot-color" value="#030712">
                    </div>
                    <div class="option-card">
                        <span>Цвет фона</span>
                        <input type="color" id="bg-color" value="#ffffff">
                    </div>
                </div>

                <button class="action-btn" id="generate-btn">СГЕНЕРИРОВАТЬ QR</button>

                <div class="result-viewport" id="result-viewport">
                    <div class="qr-frame">
                        <canvas id="qr-canvas"></canvas>
                    </div>
                    <button class="action-btn download-btn" id="download-btn">СКАЧАТЬ PNG</button>
                </div>
            </div>
        </section>

    </div>

    <script>
        // Инициализация библиотек анимации GSAP для создания параллакса из видео
        gsap.registerPlugin(ScrollTrigger);

        // Слой 1 (b.gif) движется медленнее всего
        gsap.to("#layer-1", {
            yPercent: 20,
            ease: "none",
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: true
            }
        });

        // Слой 2 (световой туман) движется со средней скоростью
        gsap.to("#layer-2", {
            yPercent: -10,
            ease: "none",
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: true
            }
        });

        // Слой 3 (передний план) уходит наверх быстрее
        gsap.to("#layer-3", {
            yPercent: -15,
            ease: "none",
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: true
            }
        });

        // ==========================================
        // ЛОГИКА ГЕНЕРАТОРА QR
        // ==========================================
        const urlInput = document.getElementById('url-input');
        const generateBtn = document.getElementById('generate-btn');
        const resultViewport = document.getElementById('result-viewport');
        const qrCanvas = document.getElementById('qr-canvas');
        const downloadBtn = document.getElementById('download-btn');
        const dotColorInput = document.getElementById('dot-color');
        const bgColorInput = document.getElementById('bg-color');

        generateBtn.addEventListener('click', () => {
            const textValue = urlInput.value.trim();
            if (!textValue) {
                alert('Пожалуйста, введите текст или ссылку!');
                return;
            }

            new QRious({
                element: qrCanvas,
                value: textValue,
                size: 260,
                foreground: dotColorInput.value,
                background: bgColorInput.value,
                level: 'H'
            });

            resultViewport.classList.add('show');

            // Музыка включается автоматически при генерации (обход ограничений браузеров)
            if (ytPlayer && typeof ytPlayer.playVideo === 'function' && !isMusicPlaying) {
                toggleMusic();
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!qrCanvas) return;
            const link = document.createElement('a');
            link.href = qrCanvas.toDataURL('image/png');
            link.download = 'premium-qr.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        urlInput.addEventListener('input', () => { resultViewport.classList.remove('show'); });

        // ==========================================
        // ПЛЕЕР ДЛЯ МУЗЫКИ ИЗ YOUTUBE (БЕЗ ВИДЕО)
        // ==========================================
        let ytPlayer;
        let isMusicPlaying = false;
        const playPauseBtn = document.getElementById('play-pause-btn');
        const audioIcon = document.getElementById('audio-icon');

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100', width: '100',
                videoId: 'diLhfXKit0U',
                playerVars: {
                    'autoplay': 0, 'controls': 0, 'disablekb': 1, 'loop': 1, 'playlist': 'diLhfXKit0U', 'modestbranding': 1
                },
                events: { 'onReady': (e) => { e.target.setVolume(35); } }
            });
        }

        function toggleMusic() {
            if (!ytPlayer) return;
            if (!isMusicPlaying) {
                ytPlayer.playVideo();
                isMusicPlaying = true;
                audioIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
                playPauseBtn.style.background = 'var(--neon-magenta)';
            } else {
                ytPlayer.pauseVideo();
                isMusicPlaying = false;
                audioIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
                playPauseBtn.style.background = 'rgba(255, 255, 255, 0.1)';
            }
        }
        playPauseBtn.addEventListener('click', toggleMusic);
    </script>
</body>
</html>
